name: DeciRepo Protocol CI

on:
  push:
  pull_request:

jobs:
  protocol-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout site mirror
        uses: actions/checkout@v5
        with:
          repository: IndrasNet108/decirepo-site
          path: decirepo-site-seed

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install deps (optional)
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json; skipping dependency install."
          fi

      - name: DLX reference conformance
        run: node dlx-ref/cli.js conformance dlx-ref/tests/conformance_v0_1.json

      - name: Protocol conformance baseline
        run: bash scripts/run-conformance.sh

      - name: Oracle vector tests
        run: python3 oracle/tests/test_vectors_v0_1.py

      - name: Kernel contract tests
        run: python3 oracle/tests/test_kernel_contract_v0_1.py

      - name: Gap classification tests
        run: python3 oracle/tests/test_gap_classification_v0_1.py

      - name: Generate bounded corpus
        run: python3 oracle/gen_corpus_v0_1.py

      - name: Generate domain-guided corpus
        run: python3 oracle/gen_domain_guided_corpus_v0_1.py

      - name: Generate boundary corpus
        run: python3 oracle/gen_boundary_corpus_v0_1.py

      - name: Generate adversarial corpus
        run: python3 oracle/gen_adversarial_corpus_v0_1.py

      - name: Generate malformed corpus
        run: python3 oracle/gen_malformed_corpus_v0_1.py

      - name: Partition tests
        run: python3 oracle/tests/test_partition_v0_1.py

      - name: Boundary and adversarial tests
        run: python3 oracle/tests/test_boundary_adversarial_v0_1.py

      - name: Domain-guided and malformed tests
        run: python3 oracle/tests/test_domain_guided_malformed_v0_1.py

      - name: Upload protocol conformance report
        uses: actions/upload-artifact@v6
        with:
          name: decirepo-protocol-conformance-v0_1
          path: out/conformance/v0_1/CONFORMANCE_REPORT.json

      - name: Federation negative tests
        run: node scripts/run_negative_federation_tests.js

      - name: Registry sanity checks
        run: node scripts/sanity_check_registry.js

      - name: Protocol exact-match guard
        run: bash scripts/check_protocol_sync.sh decirepo-site-seed
